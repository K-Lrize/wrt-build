# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: Inject Custom Feeds
description: 注入自定义第三方 Feed 并内嵌网络失败重试机制

inputs:
  sdk_dir:
    description: "SDK 或 OpenWrt 源码根目录"
    required: true
  feed_name:
    description: "自定义 Feed 名称"
    required: false
    default: "custom_feed"
  feed_path:
    description: "自定义 Feed 本地路径"
    required: false
    default: "${{ github.workspace }}/packages"

runs:
  using: composite
  steps:
    - name: 注入并拉取第三方 Feed
      shell: bash
      working-directory: ${{ inputs.sdk_dir }}
      run: |
        set -euo pipefail
        if ! grep -q "^[[:space:]]*src-[^[:space:]]\+[[:space:]]\+${{ inputs.feed_name }}[[:space:]]" feeds.conf.default 2>/dev/null; then
          echo "src-link ${{ inputs.feed_name }} ${{ inputs.feed_path }}" >> feeds.conf.default
        else
          sed -i "s|^[[:space:]]*src-[^[:space:]]\+[[:space:]]\+${{ inputs.feed_name }}[[:space:]].*|src-link ${{ inputs.feed_name }} ${{ inputs.feed_path }}|" feeds.conf.default
        fi
        echo "正在更新软件源索引..."
        for i in {1..3}; do
          if ./scripts/feeds update -a; then
            break
          else
            echo "::warning::Feed 更新网络请求失败，5秒后尝试第 $i 次重试..."
            sleep 5
          fi
        done
        ./scripts/feeds install -a -p "${{ inputs.feed_name }}"
