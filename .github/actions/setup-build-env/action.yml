# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: Setup Build Environment
description: 安装并配置 CI 构建必需的系统依赖与 yq 工具

inputs:
  profile:
    description: "构建依赖级别: full (全量编译), minimal (基础工具与解析), lint (排版校验)"
    required: false
    default: "minimal"

runs:
  using: composite
  steps:
    - name: 安装系统依赖软件包
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        case "${{ inputs.profile }}" in
          full)
            sudo apt-get install -y --no-install-recommends \
              build-essential clang flex bison g++ gawk gcc-multilib \
              gettext git libncurses-dev libssl-dev python3-setuptools \
              rsync unzip zlib1g-dev file wget zstd jq ccache \
              qemu-utils libelf-dev curl xxd
            ;;
          lint)
            sudo apt-get install -y --no-install-recommends shfmt jq curl wget
            ;;
          minimal|*)
            sudo apt-get install -y --no-install-recommends rsync zstd curl jq xxd wget file
            ;;
        esac

    - name: 安装 yq 解析工具
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v yq >/dev/null 2>&1; then
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        fi
        yq --version | head -1
