name: Lint and format check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-24.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v7

      - name: 安装校验与排版工具
        uses: ./.github/actions/setup-build-env
        with:
          profile: lint

      - name: 校验 YAML / JSON / Markdown 排版格式
        run: npx -y prettier@latest --check "**/*.{yml,yaml,json,md}"

      - name: 校验 Shell 脚本排版格式
        run: find scripts -name "*.sh" -exec shfmt -d -i 4 -s {} +

      - name: 静态校验设备配置
        run: bash scripts/lint-devices.sh

      - name: 静态校验软件包 Makefile
        run: bash scripts/lint-packages.sh
