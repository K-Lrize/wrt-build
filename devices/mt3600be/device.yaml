    - luci-i18n-upnp-zh-cn
    - luci-i18n-watchcat-zh-cn
    - luci-i18n-wifischedule-zh-cn
    - luci-i18n-wol-zh-cn
    - luci-i18n-package-manager-zh-cn
    - luci-i18n-uhttpd-zh-cn
    - luci-i18n-smartdns-zh-cn

