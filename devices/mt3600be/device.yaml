  add:
    # LuCI
    - luci
    - luci-base
    - luci-ssl
    - luci-mod-admin-full
    - luci-app-firewall
    - luci-app-uhttpd
    - luci-theme-bootstrap
    - luci-i18n-base-zh-cn
