# GL.iNet GL-MT3600BE（MT7987a + MT7990 Wi-Fi 7）

name: mt3600be

target: mediatek
subtarget: filogic
profile: glinet_gl-mt3600be
arch: aarch64_cortex-a53

source:
  channel: openwrt-25.12
  mode: download
  upstream: https://downloads.openwrt.org/releases/25.12.5

