    - kmod-tcp-bbr
    - kmod-sched
    - kmod-sched-core
    - kmod-sched-cake
    - kmod-ifb
    - kmod-usb-core
    - kmod-usb3
    - kmod-usb-storage
    # USB
    - kmod-usb-net
    - kmod-usb-net-rndis
    - kmod-usb-net-cdc-ncm
    - kmod-usb-net-cdc-ether
    - kmod-usb-net-ipheth
    - kmod-usb-net-qmi-wwan
